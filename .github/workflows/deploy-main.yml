name: Deploy AIFCA to Azure (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aifca-prod-deploy
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: aifca-meghaboi
  AZURE_WEBAPP_URL: https://aifca-meghaboi.azurewebsites.net

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_AIFCA_PROD }}
          package: .

      - name: Post-deploy health check
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..20}; do
            code=$(curl -L -s -o /dev/null -w "%{http_code}" "${AZURE_WEBAPP_URL}")
            echo "attempt=${i} status=${code}"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          exit 1
